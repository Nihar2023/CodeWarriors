<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <title>CodeWarriors — AI Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body class="app-body">
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="noise"></div>
    </div>
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <a class="logo" id="logoLink" href="#/home">
          <svg class="logo-icon" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#lg1)"/><path d="M8 10l4 4-4 4M14 18h6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs></svg>
          <span class="logo-text">Code<span class="logo-accent">Warriors</span></span>
        </a>
        <nav class="nav-links" id="topNav" aria-label="Main navigation"></nav>
        <div class="topbar-actions">
          <span class="user-chip" id="whoami"></span>
          <button type="button" class="btn btn-outline btn-sm" id="logoutBtn" hidden>Sign out</button>
        </div>
      </div>
    </header>
    <div class="api-config-bar">
      <details class="api-details">
        <summary>⚙ API Config</summary>
        <div class="api-config-inner">
          <label>Backend URL<input id="apiBase" type="text" class="input-sm" autocomplete="off" placeholder="http://localhost:8000" /></label>
          <button type="button" class="btn btn-sm btn-ghost" id="saveApiBaseBtn">Save</button>
          <span class="api-hint" id="apiHint"></span>
        </div>
      </details>
    </div>
    <div id="onboardingStrip" class="onboarding-strip" hidden aria-label="Setup progress"></div>
    <main class="main-content">
      <div id="app" class="app-view"></div>
    </main>
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
